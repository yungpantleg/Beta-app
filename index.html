<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Beta — Ascent Log</title>
<style>
:root{
  --bg:#15140F;
  --surface:#201E18;
  --surface-2:#2A2720;
  --line:#3A362C;
  --chalk:#EFE9DC;
  --muted:#9A9181;
  --rust:#C9622E;
  --rust-dim:#7A3F22;
  --moss:#7E9A66;
  --moss-dim:#4D5F3F;
  --amber:#D2A23A;
  --radius:14px;
  --font-display:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-body:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-mono:ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--chalk);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}

#app{
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  position:relative;
  background:
    radial-gradient(circle at 15% 0%, rgba(201,98,46,0.07), transparent 40%),
    var(--bg);
}

header.top{
  padding:22px 20px 14px;
  border-bottom:1px solid var(--line);
}
.brand{display:flex;align-items:baseline;gap:8px;}
.brand .mark{
  font-family:var(--font-display);
  font-weight:700;
  font-size:26px;
  letter-spacing:0.5px;
}
.brand .sub{
  font-family:var(--font-mono);
  font-size:11px;
  color:var(--rust);
  letter-spacing:1.5px;
  text-transform:uppercase;
}
.tagline{margin-top:4px;font-size:12.5px;color:var(--muted);}
.offline-pill{
  display:inline-flex;
  align-items:center;
  gap:5px;
  margin-top:8px;
  font-size:11px;
  font-family:var(--font-mono);
  color:var(--moss);
}
.offline-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--moss);}

main{flex:1;padding:18px 20px 100px;overflow-y:auto;}
.view{display:none;}
.view.active{display:block;animation:fade .2s ease;}
@keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

.field{margin-bottom:16px;}
.field label{
  display:block;
  font-size:11px;
  letter-spacing:1px;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:6px;
  font-family:var(--font-mono);
}
.hint{font-size:11.5px;color:var(--amber);margin-top:5px;font-family:var(--font-mono);}
input[type=text], input[type=date], select, textarea{
  width:100%;
  background:var(--surface);
  border:1px solid var(--line);
  color:var(--chalk);
  padding:11px 12px;
  border-radius:10px;
  font-size:15px;
  font-family:var(--font-body);
  appearance:none;
}
textarea{resize:vertical;min-height:60px;}
input:focus, select:focus, textarea:focus{outline:none;border-color:var(--rust);}

.seg{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:10px;overflow:hidden;}
.seg button{
  flex:1;padding:10px 0;background:transparent;border:none;color:var(--muted);
  font-family:var(--font-body);font-weight:600;font-size:13.5px;cursor:pointer;
}
.seg button.active{background:var(--rust-dim);color:var(--chalk);}
.seg button:not(:last-child){border-right:1px solid var(--line);}

.row2{display:flex;gap:12px;}
.row2 > .field{flex:1;}

.submit-btn{
  width:100%;padding:14px;background:var(--rust);color:#1A1208;border:none;
  border-radius:10px;font-family:var(--font-display);font-weight:700;font-size:15px;
  letter-spacing:0.3px;cursor:pointer;margin-top:6px;
}
.submit-btn:active{transform:scale(0.99);}

.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.chip{
  padding:6px 13px;border-radius:999px;border:1px solid var(--line);background:var(--surface);
  color:var(--muted);font-size:12.5px;font-weight:500;cursor:pointer;
}
.chip.active{background:var(--chalk);color:var(--bg);border-color:var(--chalk);}

.day-group{margin-bottom:18px;}
.day-label{
  font-family:var(--font-mono);font-size:11px;color:var(--muted);letter-spacing:1px;
  margin-bottom:8px;text-transform:uppercase;
}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:13px 14px;margin-bottom:10px;}
.card-top{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.grade-badge{
  font-family:var(--font-mono);font-weight:700;font-size:14px;padding:3px 9px;border-radius:7px;
  white-space:nowrap;color:#1A1208;
}
.grade-badge.boulder-outdoor{background:var(--surface-2);color:var(--amber);}
.status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;}
.status-sent .status-dot{background:var(--moss);}
.status-flash .status-dot{background:var(--amber);}
.status-attempt .status-dot{background:var(--muted);}
.meta-line{font-size:12.5px;color:var(--muted);margin-top:6px;display:flex;align-items:center;flex-wrap:wrap;gap:6px;}
.place{color:var(--chalk);font-weight:500;}
.tag{
  font-size:10.5px;font-family:var(--font-mono);color:var(--muted);border:1px solid var(--line);
  border-radius:5px;padding:1px 6px;text-transform:uppercase;
}
.notes{margin-top:7px;font-size:13px;color:#C9C2B2;line-height:1.4;}
.del-btn{background:none;border:none;color:var(--muted);font-size:18px;line-height:1;cursor:pointer;padding:2px 4px;}
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty .big{font-family:var(--font-display);font-size:17px;color:var(--chalk);margin-bottom:6px;}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px;}
.stat-box{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px;}
.stat-box .num{font-family:var(--font-display);font-weight:700;font-size:22px;color:var(--chalk);}
.stat-box .num.rust{color:var(--rust);}
.stat-box .num.amber{color:var(--amber);}
.stat-box .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-top:3px;font-family:var(--font-mono);}

.pyramid-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.pyramid-head h3{font-family:var(--font-display);font-size:15px;margin:0;font-weight:600;}
.pyr-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.pyr-grade{font-family:var(--font-mono);font-size:11.5px;font-weight:700;color:var(--muted);width:50px;text-align:right;flex-shrink:0;text-transform:capitalize;}
.pyr-bar-track{flex:1;}
.pyr-bar{height:18px;border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;min-width:22px;transition:width .4s ease;}
.pyr-bar span{font-family:var(--font-mono);font-size:11px;font-weight:700;color:#1A1208;}
.pyr-empty{color:var(--muted);font-size:13px;text-align:center;padding:30px 0;}

.breakdown-toggle{margin-bottom:16px;}

.donut-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap;padding:6px 0 4px;}
.donut{width:138px;height:138px;border-radius:50%;position:relative;flex-shrink:0;}
.donut-hole{position:absolute;inset:20px;border-radius:50%;background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;}
.donut-hole .num{font-family:var(--font-display);font-weight:700;font-size:22px;color:var(--chalk);}
.donut-hole .label{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;font-family:var(--font-mono);margin-top:2px;text-align:center;}
.legend{flex:1;min-width:150px;display:flex;flex-direction:column;gap:8px;}
.legend-row{display:flex;align-items:center;gap:8px;font-size:12.5px;}
.legend-swatch{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
.legend-label{flex:1;color:var(--chalk);}
.legend-count{color:var(--muted);font-family:var(--font-mono);font-size:11px;flex-shrink:0;}

.prog-header{display:flex;align-items:center;gap:18px;margin-bottom:22px;flex-wrap:wrap;}
.prog-ring{width:110px;height:110px;border-radius:50%;position:relative;flex-shrink:0;}
.prog-ring .ring-hole{position:absolute;inset:14px;border-radius:50%;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;}
.prog-ring .ring-hole .num{font-family:var(--font-display);font-weight:700;font-size:19px;color:var(--chalk);}
.prog-ring .ring-hole .label{font-size:9px;color:var(--muted);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.5px;}
.prog-summary{flex:1;min-width:140px;}
.prog-summary .pct{font-family:var(--font-display);font-size:26px;font-weight:700;color:var(--moss);}
.prog-summary .sub{font-size:12px;color:var(--muted);margin-top:2px;}
.prog-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.prog-grade-label{font-family:var(--font-mono);font-size:11.5px;font-weight:700;color:var(--muted);width:42px;text-align:right;flex-shrink:0;}
.prog-track{flex:1;height:14px;background:var(--surface-2);border-radius:7px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg, var(--moss-dim), var(--moss));}
.prog-count{font-family:var(--font-mono);font-size:11px;color:var(--muted);width:46px;text-align:right;flex-shrink:0;}
.no-db-note{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:13px 14px;
  font-size:13px;color:var(--muted);line-height:1.45;margin-bottom:18px;
}
.completed-details{margin-top:18px;font-size:13px;color:var(--muted);}
.completed-details summary{cursor:pointer;color:var(--chalk);font-weight:600;margin-bottom:8px;font-family:var(--font-body);}
.completed-details ul{margin:0;padding-left:18px;line-height:1.7;}
.completed-details li{margin-bottom:2px;}

.proj-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;}
.new-proj-btn{
  background:var(--rust);color:#1A1208;border:none;border-radius:10px;padding:9px 14px;
  font-family:var(--font-display);font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;
}
.proj-card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:14px;margin-bottom:10px;cursor:pointer;
}
.proj-card:active{transform:scale(0.99);}
.proj-card-top{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.proj-name{font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--chalk);}
.status-badge{
  font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.6px;
  padding:3px 8px;border-radius:6px;flex-shrink:0;
}
.status-badge.active{background:var(--rust-dim);color:var(--chalk);}
.status-badge.sent{background:var(--moss-dim);color:var(--chalk);}
.status-badge.parked{background:var(--surface-2);color:var(--muted);}
.proj-meta{font-size:12px;color:var(--muted);margin-top:6px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.proj-stats-line{font-size:11.5px;color:var(--muted);margin-top:8px;font-family:var(--font-mono);display:flex;gap:14px;}

.proj-detail-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:4px;}
.back-link{background:none;border:none;color:var(--muted);font-size:13px;font-family:var(--font-body);cursor:pointer;padding:0 0 14px;display:flex;align-items:center;gap:5px;}
.back-link svg{width:15px;height:15px;}

.detail-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0 22px;}
.detail-stat-grid .stat-box .num{font-size:18px;}

.session-form{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:14px;margin-bottom:20px;
}
.session-form h4{font-family:var(--font-display);font-size:14px;margin:0 0 12px;font-weight:600;}
.checkbox-row{display:flex;align-items:center;gap:9px;margin:10px 0 14px;}
.checkbox-row input{width:18px;height:18px;accent-color:var(--moss);}
.checkbox-row label{font-size:13.5px;color:var(--chalk);margin:0;text-transform:none;letter-spacing:0;font-family:var(--font-body);}

.timeline{margin-top:4px;}
.timeline h3{font-family:var(--font-display);font-size:15px;margin:0 0 12px;font-weight:600;}
.session-row{
  border-left:2px solid var(--line);padding:2px 0 14px 16px;position:relative;margin-bottom:2px;
}
.session-row::before{
  content:'';position:absolute;left:-5px;top:5px;width:8px;height:8px;border-radius:50%;background:var(--rust);
}
.session-row.sent-mark::before{background:var(--moss);}
.session-row:last-child{padding-bottom:0;}
.session-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
.session-date{font-family:var(--font-mono);font-size:12px;color:var(--chalk);font-weight:600;}
.session-attempts{font-family:var(--font-mono);font-size:11px;color:var(--muted);}
.session-note{font-size:13px;color:#C9C2B2;line-height:1.45;margin-top:4px;}
.session-sent-tag{font-size:10px;font-family:var(--font-mono);color:var(--moss);text-transform:uppercase;letter-spacing:0.5px;margin-top:3px;}
.del-session{background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;padding:0 4px;}

.proj-actions{display:flex;gap:10px;margin-top:22px;}
.proj-actions .backup-btn{flex:1;}
.danger-confirm{margin-top:10px;}

.history-toolbar{margin-bottom:14px;}
.history-toolbar input[type=text]{margin-bottom:10px;}
.search-sort-row{display:flex;gap:10px;align-items:flex-start;}
.search-sort-row .filters{flex:1;margin-bottom:0;}
.search-sort-row select{width:auto;flex-shrink:0;min-width:112px;padding:9px 10px;font-size:13px;}

.card-actions{display:flex;align-items:center;gap:2px;}
.edit-btn{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:2px 6px;}
.cond-tag{
  font-size:10.5px;font-family:var(--font-mono);color:var(--amber);border:1px solid var(--line);
  border-radius:5px;padding:1px 6px;display:inline-block;
}

.heat-wrap{overflow-x:auto;padding-bottom:4px;}
.heat-grid{display:grid;grid-auto-flow:column;grid-template-rows:repeat(7, 1fr);gap:3px;width:max-content;}
.heat-cell{width:11px;height:11px;border-radius:2px;background:var(--surface-2);}
.heat-cell.l1{background:#5A3322;}
.heat-cell.l2{background:#8A4A28;}
.heat-cell.l3{background:var(--rust);}
.heat-cell.l4{background:#E8895A;}
.heat-legend{display:flex;align-items:center;gap:5px;margin-top:8px;font-size:10.5px;color:var(--muted);font-family:var(--font-mono);}
.heat-legend .heat-cell{width:9px;height:9px;}
.streak-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:14px 0 24px;}
.streak-grid .stat-box{padding:12px;}
.streak-grid .stat-box .num{font-size:18px;}

.browse-details{margin-top:18px;font-size:13px;color:var(--muted);}
.browse-details summary{cursor:pointer;color:var(--chalk);font-weight:600;margin-bottom:10px;font-family:var(--font-body);}
.browse-list{max-height:360px;overflow-y:auto;border:1px solid var(--line);border-radius:10px;}
.browse-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 12px;border-bottom:1px solid var(--line);}
.browse-row:last-child{border-bottom:none;}
.browse-row.done{opacity:0.5;}
.browse-name{font-size:13px;color:var(--chalk);}
.browse-grade{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-left:6px;}
.browse-check{color:var(--moss);font-size:11px;font-family:var(--font-mono);white-space:nowrap;}
.browse-start{
  background:var(--surface-2);border:1px solid var(--line);color:var(--chalk);border-radius:7px;
  padding:4px 9px;font-size:11px;font-family:var(--font-body);cursor:pointer;white-space:nowrap;
}

.wish-star{
  background:none;border:1px solid var(--line);border-radius:7px;padding:3px 7px;
  font-size:13px;color:var(--muted);cursor:pointer;line-height:1;flex-shrink:0;
}
.wish-star.active{color:var(--amber);border-color:var(--amber);background:rgba(210,162,58,0.1);}
.wish-remove{background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;padding:0 4px;flex-shrink:0;}
.wish-row-actions{display:flex;align-items:center;gap:6px;}
.wish-add-row{display:flex;gap:8px;margin-top:12px;}
.wish-add-row input{flex:1;}
.wish-add-row select{width:auto;flex-shrink:0;min-width:90px;}
.wish-add-row button{flex-shrink:0;}
.wish-section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.wish-section-head h3{font-family:var(--font-display);font-size:15px;margin:0;font-weight:600;}

.day-note-card{
  background:var(--surface-2);border-left:3px solid var(--amber);border-radius:8px;
  padding:10px 12px;margin-bottom:10px;font-size:13px;color:#C9C2B2;font-style:italic;line-height:1.4;
}

.backup-section{
  margin-top:28px;
  padding-top:18px;
  border-top:1px solid var(--line);
}
.backup-section h3{font-family:var(--font-display);font-size:15px;margin:0 0 4px;font-weight:600;}
.backup-section .sub-text{font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.4;}
.backup-row{display:flex;gap:10px;margin-bottom:10px;}
.backup-btn{
  flex:1;padding:11px;border-radius:10px;border:1px solid var(--line);background:var(--surface);
  color:var(--chalk);font-size:13.5px;font-weight:600;cursor:pointer;text-align:center;
  font-family:var(--font-body);
}
.backup-btn:active{transform:scale(0.99);}
.backup-btn.primary{background:var(--rust-dim);border-color:var(--rust-dim);}
input[type=file]{display:none;}
.import-confirm{
  background:var(--surface-2);border:1px solid var(--line);border-radius:var(--radius);
  padding:14px;margin-top:6px;
}
.import-confirm p{font-size:13.5px;margin:0 0 12px;line-height:1.4;}
.import-confirm .backup-row{margin-bottom:0;}
.import-confirm .backup-btn.danger{background:var(--rust-dim);}
.import-confirm .backup-btn.ghost{background:transparent;}

nav.bottom{
  position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;
  background:rgba(21,20,15,0.94);border-top:1px solid var(--line);display:flex;
  padding:8px 10px calc(8px + env(safe-area-inset-bottom));
}
nav.bottom button{
  flex:1;background:none;border:none;color:var(--muted);display:flex;flex-direction:column;
  align-items:center;gap:3px;padding:6px 0;font-size:11px;font-weight:600;cursor:pointer;
}
nav.bottom button.active{color:var(--rust);}
nav.bottom svg{width:20px;height:20px;}

.toast{
  position:fixed;bottom:78px;left:50%;transform:translateX(-50%);background:var(--chalk);color:var(--bg);
  padding:9px 16px;border-radius:999px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;
  transition:opacity .25s ease;white-space:nowrap;max-width:90%;text-align:center;
}
.toast.show{opacity:1;}

@media (prefers-reduced-motion: reduce){ .view.active{animation:none;} }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ---------- Grading systems ---------- */
const VGRADES = ['VB','V0','V1','V2','V3','V4','V5','V6','V7','V8','V9','V10','V11','V12','V13','V14','V15','V16','V17'];
const GYM_COLORS = [
  { key:'orange', label:'Orange', range:'V0',    hex:'#D2742A' },
  { key:'red',    label:'Red',    range:'V1/2',  hex:'#C0392B' },
  { key:'blue',   label:'Blue',   range:'V3/4',  hex:'#3C6E9C' },
  { key:'green',  label:'Green',  range:'V5/6',  hex:'#5C8A4A' },
  { key:'purple', label:'Purple', range:'V7/8',  hex:'#7B5BA6' },
  { key:'black',  label:'Black',  range:'V9/10', hex:'#2B2926' },
  { key:'pink',   label:'Pink',   range:'V11+',  hex:'#C45B8C' }
];
const CLIMB_TYPES = ['Slab','Vertical','Overhang','Roof','Arete','Crimpy','Compression','Technical / Balancy','Powerful / Dynamic','Mantle','Crack'];
const CLIMB_TYPE_COLORS = {
  'Slab':'#8B7355', 'Vertical':'#6E8B74', 'Overhang':'#C9622E', 'Roof':'#A6492C',

function gymColorIndex(key){ return GYM_COLORS.findIndex(c => c.key === key); }

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function todayISO(){
  const d = new Date();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${d.getFullYear()}-${m}-${day}`;
}
function addDaysISO(iso, delta){
  const [y, m, d] = iso.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  dt.setDate(dt.getDate() + delta);
  const mm = String(dt.getMonth() + 1).padStart(2, '0');
  const dd = String(dt.getDate()).padStart(2, '0');
  return `${dt.getFullYear()}-${mm}-${dd}`;
}
function dateDiffDays(isoA, isoB){
  const [ya, ma, da] = isoA.split('-').map(Number);
  const [yb, mb, db] = isoB.split('-').map(Number);
  const a = new Date(ya, ma - 1, da), b = new Date(yb, mb - 1, db);
  return Math.round((a - b) / 86400000);
}
function entryRank(a){ return a.venue === 'gym' ? gymColorIndex(a.gymColor) : VGRADES.indexOf(a.grade); }
function fmtDate(iso){

/* ---------- Activity / streaks ---------- */
function getActivityCounts(){
  const counts = {};
  ascents.forEach(a => { counts[a.date] = (counts[a.date] || 0) + 1; });
  projects.forEach(p => (p.sessions || []).forEach(s => { counts[s.date] = (counts[s.date] || 0) + 1; }));
  return counts;
}
function computeStreaks(dateSet){
  if(dateSet.size === 0) return { current: 0, longest: 0, activeDays: 0 };
  const sorted = Array.from(dateSet).sort();
  let longest = 1, run = 1;
  for(let i = 1; i < sorted.length; i++){
    const diff = dateDiffDays(sorted[i], sorted[i-1]);
    if(diff === 1) run++; else if(diff > 1) run = 1;
    if(run > longest) longest = run;
  }
  let current = 0;
  let cursor = todayISO();
  if(!dateSet.has(cursor)) cursor = addDaysISO(cursor, -1);
  while(dateSet.has(cursor)){
    current++;
    cursor = addDaysISO(cursor, -1);
  }
  return { current, longest, activeDays: dateSet.size };
}
function renderHeatmap(counts){
  const todayIso = todayISO();
  const [ty, tm, td] = todayIso.split('-').map(Number);
  const todayDow = new Date(ty, tm - 1, td).getDay();
  const weeks = 18;
  const totalDays = weeks * 7;
  const daysAfterToday = 6 - todayDow;
  const endDate = addDaysISO(todayIso, daysAfterToday);
  const startDate = addDaysISO(endDate, -(totalDays - 1));
  let cells = '';
  for(let i = 0; i < totalDays; i++){
    const d = addDaysISO(startDate, i);
    const c = counts[d] || 0;
    const future = dateDiffDays(d, todayIso) > 0;
    let lvl = '';
    if(c >= 4) lvl = 'l4'; else if(c === 3) lvl = 'l3'; else if(c === 2) lvl = 'l2'; else if(c === 1) lvl = 'l1';
    cells += `<div class="heat-cell ${lvl}" ${future ? 'style="visibility:hidden;"' : ''} title="${d}: ${c} session${c===1?'':'s'}"></div>`;
  }
  return `<div class="heat-wrap"><div class="heat-grid">${cells}</div></div>`;
}
function renderActivitySection(){
  const counts = getActivityCounts();
  const dateSet = new Set(Object.keys(counts));
  const { current, longest, activeDays } = computeStreaks(dateSet);
  return `
    <div class="pyramid-head"><h3>Activity</h3></div>
    <div class="streak-grid">
      <div class="stat-box"><div class="num rust">${current}</div><div class="label">Current streak</div></div>
      <div class="stat-box"><div class="num amber">${longest}</div><div class="label">Longest streak</div></div>
      <div class="stat-box"><div class="num">${activeDays}</div><div class="label">Active days</div></div>
    </div>
    ${renderHeatmap(counts)}
    <div class="heat-legend">Less<div class="heat-cell"></div><div class="heat-cell l1"></div><div class="heat-cell l2"></div><div class="heat-cell l3"></div><div class="heat-cell l4"></div>More</div>
  `;
}

function renderHistory(){
  let list = ascents.slice();
  if(historyFilter !== 'all'){ list = list.filter(a => a.venue === historyFilter); }
  if(historySearch.trim()){
    const q = historySearch.trim().toLowerCase();
    list = list.filter(a => {
      const hay = [a.problemName, a.gymName, a.crag, a.notes, a.climbType, a.grade].filter(Boolean).join(' ').toLowerCase();
      return hay.includes(q);
    });
  }

  const dateSortable = historySort === 'newest' || historySort === 'oldest';
  if(historySort === 'newest') list.sort((a,b) => (a.date < b.date ? 1 : a.date > b.date ? -1 : 0));
  else if(historySort === 'oldest') list.sort((a,b) => (a.date > b.date ? 1 : a.date < b.date ? -1 : 0));
  else if(historySort === 'hardest') list.sort((a,b) => entryRank(b) - entryRank(a));
  else if(historySort === 'easiest') list.sort((a,b) => entryRank(a) - entryRank(b));

  let body;
  if(list.length === 0){
    body = `<div class="empty"><div class="big">No ascents found</div>${ascents.length === 0 ? 'Hit "Log" to add your first send.' : 'Try a different search or filter.'}</div>`;
  }else if(dateSortable){
    const groups = {};
    list.forEach(a => { (groups[a.date] = groups[a.date] || []).push(a); });
    body = Object.keys(groups).map(date => {
      const note = getDayNote(date);
      return `
      <div class="day-group">
        <div class="day-label">${fmtDate(date)}</div>
        ${note ? `<div class="day-note-card">🗒 ${escapeHtml(note.note)}</div>` : ''}
        ${groups[date].map(a => cardHtml(a, false)).join('')}
      </div>
    `;
    }).join('');
  }else{
    body = list.map(a => cardHtml(a, true)).join('');
  }

  return `

        <div class="filters">
          <div class="chip ${historyFilter==='all'?'active':''}" data-filter="all">All</div>
          <div class="chip ${historyFilter==='gym'?'active':''}" data-filter="gym">Gym</div>
          <div class="chip ${historyFilter==='outdoor'?'active':''}" data-filter="outdoor">Outdoor</div>
        </div>
        <select id="history-sort">
          <option value="newest" ${historySort==='newest'?'selected':''}>Newest</option>
          <option value="oldest" ${historySort==='oldest'?'selected':''}>Oldest</option>
          <option value="hardest" ${historySort==='hardest'?'selected':''}>Hardest</option>
          <option value="easiest" ${historySort==='easiest'?'selected':''}>Easiest</option>
        </select>
      </div>
    </div>
    ${body}
  </div>`;
}

function cardHtml(a, showDate){
  const statusLabel = a.status === 'sent' ? 'Sent' : a.status === 'flash' ? 'Flash' : 'Attempt';
  let gradeBadge, placeLine;
  if(a.venue === 'gym'){
    const c = gymColorInfo(a.gymColor) || GYM_COLORS[0];
    gradeBadge = `<div class="grade-badge" style="background:${c.hex};">${c.label}</div>`;
    placeLine = `<span class="place">${escapeHtml(a.gymName || 'Gym')}</span>`;
  }else{
    gradeBadge = `<div class="grade-badge boulder-outdoor">${escapeHtml(a.grade || '?')}</div>`;
    placeLine = `<span class="place">${escapeHtml(a.crag || 'Outdoor')}</span>${a.problemName ? ` · ${escapeHtml(a.problemName)}` : ''}`;
  }
  const condBits = [a.friction, a.humidity, a.temp].filter(Boolean).join(' · ');
  return `
    <div class="card">
      <div class="card-top">
        ${gradeBadge}
        <div class="card-actions">
          <button class="edit-btn" data-edit-ascent="${a.id}" aria-label="Edit">${iconEdit()}</button>
          <button class="del-btn" data-del="${a.id}" aria-label="Delete">×</button>
        </div>
      </div>
      <div class="meta-line status-${a.status}">
        <span class="status-dot"></span>${statusLabel}
        <span>·</span>${placeLine}
        ${showDate ? `<span>·</span><span>${fmtDate(a.date)}</span>` : ''}
        <span>·</span><span>${a.venue === 'gym' ? 'Gym' : 'Outdoor'}</span>
        ${a.climbType ? `<span class="tag">${escapeHtml(a.climbType)}</span>` : ''}
      </div>
      ${condBits ? `<div class="meta-line"><span class="cond-tag">${escapeHtml(condBits)}</span></div>` : ''}
      ${a.notes ? `<div class="notes">${escapeHtml(a.notes)}</div>` : ''}
    </div>
  `;
}

function renderStats(){
  const sentAll = ascents.filter(a => a.status === 'sent' || a.status === 'flash');
  const total = ascents.length;
  const totalSent = sentAll.length;
  const month = todayISO().slice(0,7);
  const thisMonth = ascents.filter(a => a.date.slice(0,7) === month).length;

  const outdoorSent = sentAll.filter(a => a.venue === 'outdoor');
  let hardestOutdoor = '—';
  if(outdoorSent.length){
    hardestOutdoor = outdoorSent.reduce((best,a) => VGRADES.indexOf(a.grade) > VGRADES.indexOf(best) ? a.grade : best, outdoorSent[0].grade);
  }
  const gymSent = sentAll.filter(a => a.venue === 'gym');
  let hardestGymKey = null;
  gymSent.forEach(a => { if(hardestGymKey === null || gymColorIndex(a.gymColor) > gymColorIndex(hardestGymKey)) hardestGymKey = a.gymColor; });
  const hardestGymLabel = hardestGymKey ? gymColorInfo(hardestGymKey).label : '—';

  let breakdownBody;
  if(breakdownMode === 'grade'){
    let pyramidBody;
    if(pyramidMode === 'outdoor'){
      const counts = {};
      outdoorSent.forEach(a => { counts[a.grade] = (counts[a.grade] || 0) + 1; });
      const used = VGRADES.filter(g => counts[g]);
      const maxCount = Math.max(1, ...used.map(g => counts[g]));
      pyramidBody = used.length === 0 ? `<div class="pyr-empty">No outdoor sends logged yet.</div>` :
        used.slice().reverse().map(g => {
          const pct = Math.max(10, Math.round((counts[g] / maxCount) * 100));
          return `<div class="pyr-row"><div class="pyr-grade">${g}</div><div class="pyr-bar-track"><div class="pyr-bar" style="width:${pct}%;background:linear-gradient(90deg, var(--rust-dim), var(--rust));"><span>${counts[g]}</span></div></div></div>`;
        }).join('');
    }else{
      const counts = {};
      gymSent.forEach(a => { counts[a.gymColor] = (counts[a.gymColor] || 0) + 1; });
      const used = GYM_COLORS.filter(c => counts[c.key]);
      const maxCount = Math.max(1, ...used.map(c => counts[c.key]));
      pyramidBody = used.length === 0 ? `<div class="pyr-empty">No gym sends logged yet.</div>` :
        used.slice().reverse().map(c => {
          const pct = Math.max(10, Math.round((counts[c.key] / maxCount) * 100));
          return `<div class="pyr-row"><div class="pyr-grade">${c.label}</div><div class="pyr-bar-track"><div class="pyr-bar" style="width:${pct}%;background:${c.hex};"><span>${counts[c.key]}</span></div></div></div>`;
        }).join('');
    }
    breakdownBody = `
      <div class="pyramid-head">
        <h3>Grade pyramid</h3>
        <div class="seg" style="width:160px;">
          <button type="button" data-pyr="outdoor" class="${pyramidMode==='outdoor'?'active':''}">Outdoor</button>
          <button type="button" data-pyr="gym" class="${pyramidMode==='gym'?'active':''}">Gym</button>
        </div>
      </div>
      ${pyramidBody}
    `;
  }else{
    const counts = {};
    sentAll.forEach(a => { if(a.climbType){ counts[a.climbType] = (counts[a.climbType] || 0) + 1; } });
    const used = CLIMB_TYPES.filter(t => counts[t]);
    const sentWithType = used.reduce((s,t) => s + counts[t], 0);
    if(used.length === 0){
      breakdownBody = `<div class="pyramid-head"><h3>Climbing style</h3></div><div class="pyr-empty">No sends with a climb type logged yet.</div>`;
    }else{
      let cumulative = 0;
      const gradientParts = used.map(t => {
        const startDeg = (cumulative / sentWithType) * 360;
        cumulative += counts[t];
        const endDeg = (cumulative / sentWithType) * 360;
        return `${CLIMB_TYPE_COLORS[t] || '#9A9181'} ${startDeg}deg ${endDeg}deg`;
      });
      const donutBg = `conic-gradient(${gradientParts.join(', ')})`;
      const legendRows = used.slice().sort((a,b) => counts[b] - counts[a]).map(t => `
        <div class="legend-row">
          <span class="legend-swatch" style="background:${CLIMB_TYPE_COLORS[t] || '#9A9181'};"></span>
          <span class="legend-label">${escapeHtml(t)}</span>
          <span class="legend-count">${counts[t]}</span>
        </div>
      `).join('');
      breakdownBody = `
        <div class="pyramid-head"><h3>Climbing style</h3></div>
        <div class="donut-wrap">
          <div class="donut" style="background:${donutBg};">
            <div class="donut-hole"><div class="num">${sentWithType}</div><div class="label">sends</div></div>
          </div>
          <div class="legend">${legendRows}</div>
        </div>
      `;
    }
  }

  return `
  <div class="view ${activeView==='stats'?'active':''}" id="view-stats">
    <div class="stat-grid">
      <div class="stat-box"><div class="num">${total}</div><div class="label">Total logged</div></div>
      <div class="stat-box"><div class="num rust">${totalSent}</div><div class="label">Sent</div></div>
      <div class="stat-box"><div class="num amber">${hardestOutdoor}</div><div class="label">Hardest outdoor</div></div>
      <div class="stat-box"><div class="num amber">${hardestGymLabel}</div><div class="label">Hardest gym color</div></div>
      <div class="stat-box" style="grid-column:1/-1;"><div class="num">${thisMonth}</div><div class="label">Logged this month</div></div>
    </div>
    ${renderActivitySection()}
    <div class="breakdown-toggle seg">
      <button type="button" data-breakdown="grade" class="${breakdownMode==='grade'?'active':''}">Grade pyramid</button>
      <button type="button" data-breakdown="style" class="${breakdownMode==='style'?'active':''}">Climbing style</button>
    </div>
    ${breakdownBody}
    <div class="backup-section">
      <h3>Backup &amp; restore</h3>
      <div class="sub-text">Export saves a file you can keep somewhere safe or move to a new phone. Import loads ascents from a backup file — it won't duplicate entries you already have.</div>
      <div class="backup-row">
        <button type="button" class="backup-btn primary" id="export-btn">Export backup</button>
        <button type="button" class="backup-btn" id="import-btn">Import backup</button>
      </div>
      <input type="file" id="import-file" accept="application/json,.json">
      ${importPending ? `
        <div class="import-confirm">
          <p>Found <strong>${importPending.ascents.length}</strong> ascent${importPending.ascents.length === 1 ? '' : 's'}${importPending.projects.length ? ` and <strong>${importPending.projects.length}</strong> project${importPending.projects.length === 1 ? '' : 's'}` : ''} in <strong>${escapeHtml(importFileName)}</strong>. How should this be applied to your current log?</p>
          <div class="backup-row">
            <button type="button" class="backup-btn primary" id="merge-btn">Merge in</button>
            <button type="button" class="backup-btn danger" id="replace-btn">Replace all</button>
          </div>
          <div class="backup-row" style="margin-top:8px;">
            <button type="button" class="backup-btn ghost" id="cancel-import-btn">Cancel</button>
          </div>
        </div>
      ` : ''}
    </div>
  </div>`;
}

function getCragDatabase(crag){
  if(crag === 'Calabogie') return CALABOGIE_PROBLEMS;
  return null;
}

function bucketGrade(g){
  if(!g) return 'Other';
  if(g === 'VB') return 'VB';
  const m = g.match(/^V(\d+)/);
  if(m){
    const candidate = 'V' + m[1];
    return VGRADES.includes(candidate) ? candidate : 'Other';
  }
  return 'Other';
}

function renderCragProgress(){
  const cragOpts = CRAGS.map(c => `<button type="button" data-progress-crag="${c}" class="${c===progressCrag?'active':''}">${c}</button>`).join('');
  const db = getCragDatabase(progressCrag);
  const doneNames = new Set();
  ascents.forEach(a => {
    if(a.venue === 'outdoor' && a.crag === progressCrag && (a.status === 'sent' || a.status === 'flash') && a.problemName){
      doneNames.add(a.problemName.trim());
    }
  });

  const wishItems = wishlist.filter(w => w.crag === progressCrag);
  const wishRows = wishItems.slice().sort((a,b) => a.name.localeCompare(b.name)).map(w => {
    const isDone = doneNames.has(w.name);
    return `
      <div class="browse-row">
        <span class="browse-name">${escapeHtml(w.name)}${w.grade ? `<span class="browse-grade">${escapeHtml(w.grade)}</span>` : ''}</span>
        <div class="wish-row-actions">
          ${isDone ? '<span class="browse-check">✓ Done</span>' : `<button type="button" class="browse-start" data-qs-name="${escapeHtml(w.name)}" data-qs-grade="${escapeHtml(w.grade||'')}" data-qs-crag="${escapeHtml(progressCrag)}">+ Project</button>`}
          <button type="button" class="wish-remove" data-wish-remove="${w.id}" aria-label="Remove from wishlist">×</button>
        </div>
      </div>
    `;
  }).join('');

  const wishlistSection = `
    <div class="wish-section-head"><h3>★ Wishlist${wishItems.length ? ` (${wishItems.length})` : ''}</h3></div>
    ${wishItems.length ? `<div class="browse-list" style="margin-bottom:4px;">${wishRows}</div>` : `<div class="pyr-empty" style="padding:14px 0;">No wishlist climbs yet for ${progressCrag}.${db ? ' Star one in the list below, or add it here:' : ' Add one below:'}</div>`}
    <div class="wish-add-row">
      <input type="text" id="wish-add-name" placeholder="Problem name" ${progressCrag === 'Calabogie' ? 'list="calabogie-list-wish"' : ''}>
      ${progressCrag === 'Calabogie' ? `<datalist id="calabogie-list-wish">${CALABOGIE_PROBLEMS.map(p => `<option value="${escapeHtml(p[0])}">`).join('')}</datalist>` : ''}
      <select id="wish-add-grade"><option value="">Grade</option>${VGRADES.map(g => `<option value="${g}">${g}</option>`).join('')}</select>
      <button type="button" class="backup-btn primary" id="wish-add-btn">+ Add</button>
    </div>
  `;

  let body;
  if(db){
    const completedList = db.filter(p => doneNames.has(p[0]));
    const total = db.length;
    const completed = completedList.length;
    const pct = total ? Math.round((completed / total) * 100) : 0;

    const gradeTotals = {};
    db.forEach(p => { const b = bucketGrade(p[1]); gradeTotals[b] = (gradeTotals[b] || 0) + 1; });
    const gradeDone = {};
    completedList.forEach(p => { const b = bucketGrade(p[1]); gradeDone[b] = (gradeDone[b] || 0) + 1; });

    const order = [...VGRADES.slice().reverse(), 'Other'];
    const rows = order.filter(b => gradeTotals[b]).map(b => {
      const t = gradeTotals[b];
      const d = gradeDone[b] || 0;
      const fillPct = Math.round((d / t) * 100);
      const label = b === 'Other' ? 'Other' : b;
      return `
        <div class="prog-row">
          <div class="prog-grade-label">${label}</div>
          <div class="prog-track"><div class="prog-fill" style="width:${fillPct}%;"></div></div>
          <div class="prog-count">${d}/${t}</div>
        </div>
      `;
    }).join('');

    const ringBg = `conic-gradient(var(--moss) ${pct * 3.6}deg, var(--surface-2) ${pct * 3.6}deg)`;

    const completedItems = completedList.slice().sort((a,b) => a[0].localeCompare(b[0]))
      .map(p => `<li>${escapeHtml(p[0])} — ${escapeHtml(p[1])}</li>`).join('');

    const browseRows = db.slice().sort((a,b) => a[0].localeCompare(b[0])).map(p => {
      const isDone = doneNames.has(p[0]);
      const starred = isWishlisted(progressCrag, p[0]);
      return `
        <div class="browse-row ${isDone ? 'done' : ''}">
          <span class="browse-name">${escapeHtml(p[0])}<span class="browse-grade">${escapeHtml(p[1])}</span></span>
          <div class="wish-row-actions">
            <button type="button" class="wish-star ${starred ? 'active' : ''}" data-wish-toggle data-wish-crag="${escapeHtml(progressCrag)}" data-wish-name="${escapeHtml(p[0])}" data-wish-grade="${escapeHtml(p[1])}" aria-label="Star">★</button>
            ${isDone ? '<span class="browse-check">✓ Done</span>' : `<button type="button" class="browse-start" data-qs-name="${escapeHtml(p[0])}" data-qs-grade="${escapeHtml(p[1])}" data-qs-crag="${escapeHtml(progressCrag)}">+ Project</button>`}
          </div>
        </div>
      `;
    }).join('');

    body = `
      <div class="prog-header">
        <div class="prog-ring" style="background:${ringBg};">
          <div class="ring-hole"><div class="num">${pct}%</div><div class="label">done</div></div>
        </div>
        <div class="prog-summary">
          <div class="pct">${completed} / ${total}</div>
          <div class="sub">problems climbed at ${progressCrag} (Otter Pond)</div>
        </div>
      </div>
      ${rows || '<div class="pyr-empty">No grade data available.</div>'}
      <details class="completed-details">
        <summary>View completed problems (${completed})</summary>
        <ul>${completedItems || '<li>None yet — get out there!</li>'}</ul>
      </details>
      <details class="browse-details">
        <summary>Browse all problems (${db.length}) — star or start a project from one</summary>
        <div class="browse-list">${browseRows}</div>
      </details>
    `;
  }else{
    const counts = {};
    let loggedCount = 0;
    ascents.forEach(a => {
      if(a.venue === 'outdoor' && a.crag === progressCrag && (a.status === 'sent' || a.status === 'flash')){
        const b = bucketGrade(a.grade);
        counts[b] = (counts[b] || 0) + 1;
        loggedCount++;
      }
    });
    const order = [...VGRADES.slice().reverse(), 'Other'];
    const used = order.filter(b => counts[b]);
    const maxCount = Math.max(1, ...used.map(b => counts[b]));
    const rows = used.map(b => {
      const w = Math.max(10, Math.round((counts[b] / maxCount) * 100));
      return `<div class="pyr-row"><div class="pyr-grade">${b}</div><div class="pyr-bar-track"><div class="pyr-bar" style="width:${w}%;background:linear-gradient(90deg, var(--rust-dim), var(--rust));"><span>${counts[b]}</span></div></div></div>`;
    }).join('');

    body = `
      <div class="no-db-note">No guidebook list loaded for ${progressCrag} yet, so there's no total to measure against — just your own logged sends. Ask Claude to add a problem list for this crag and it'll show full progress here too.</div>
      ${loggedCount ? `<div class="stat-box" style="margin-bottom:18px;"><div class="num rust">${loggedCount}</div><div class="label">Sends logged at ${progressCrag}</div></div>${rows}` : `<div class="pyr-empty">No sends logged at ${progressCrag} yet.</div>`}
    `;
  }

  return `
  <div class="view ${activeView==='crag'?'active':''}" id="view-crag">
    <div class="field">
      <label>Crag</label>
      <div class="seg">${cragOpts}</div>
    </div>
    ${wishlistSection}
    <div style="margin-top:24px;">${body}</div>
  </div>`;
}

function showToast(msg){
  const t = document.getElementById('toast');
  if(!t) return;
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function exportBackup(){
  try{
    const payload = {
      app: 'beta-ascent-log',
      exportedAt: new Date().toISOString(),
      ascents: ascents,
      projects: projects,
      wishlist: wishlist,
      dayNotes: dayNotes
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `beta-backup-${todayISO()}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    showToast('Backup downloaded');
  }catch(e){
    showToast('Export failed on this device');
  }
}

function readImportFile(file){
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const parsed = JSON.parse(reader.result);
      const ascentList = Array.isArray(parsed) ? parsed : Array.isArray(parsed.ascents) ? parsed.ascents : null;
      const projectList = Array.isArray(parsed.projects) ? parsed.projects : [];
      const wishlistList = Array.isArray(parsed.wishlist) ? parsed.wishlist : [];
      const dayNotesList = Array.isArray(parsed.dayNotes) ? parsed.dayNotes : [];
      if(!ascentList) throw new Error('bad format');
      importPending = { ascents: ascentList, projects: projectList, wishlist: wishlistList, dayNotes: dayNotesList };
      importFileName = file.name;
      render();
    }catch(e){
      showToast("Couldn't read that file — is it a Beta backup?");
    }
  };
  reader.onerror = () => showToast("Couldn't read that file");
  reader.readAsText(file);
}

function mergeImport(){
  const existingIds = new Set(ascents.map(a => a.id));
  let added = 0;
  importPending.ascents.forEach(a => {
    if(a && a.id && !existingIds.has(a.id)){
      ascents.push(a);
      existingIds.add(a.id);
      added++;
    }
  });
  const existingProjIds = new Set(projects.map(p => p.id));
  let addedProj = 0;
  importPending.projects.forEach(p => {
    if(p && p.id && !existingProjIds.has(p.id)){
      projects.push(p);
      existingProjIds.add(p.id);
      addedProj++;
    }
  });
  const existingWishKeys = new Set(wishlist.map(w => w.crag + '|' + w.name));
  (importPending.wishlist || []).forEach(w => {
    if(w && w.crag && w.name && !existingWishKeys.has(w.crag + '|' + w.name)){
      wishlist.push({ id: w.id || uid(), crag: w.crag, name: w.name, grade: w.grade || '' });
      existingWishKeys.add(w.crag + '|' + w.name);
    }
  });
  const existingNoteDates = new Set(dayNotes.map(d => d.date));
  (importPending.dayNotes || []).forEach(d => {
    if(d && d.date && !existingNoteDates.has(d.date)){
      dayNotes.push({ id: d.id || uid(), date: d.date, note: d.note || '' });
      existingNoteDates.add(d.date);
    }
  });
  saveAscents();
  saveProjects();
  saveWishlist();
  saveDayNotes();
  importPending = null;
  importFileName = '';
  render();
  showToast(`Added ${added} ascent${added === 1 ? '' : 's'}, ${addedProj} project${addedProj === 1 ? '' : 's'}`);
}

function replaceImport(){
  ascents = importPending.ascents.slice();
  projects = importPending.projects.slice();
  wishlist = (importPending.wishlist || []).slice();
  dayNotes = (importPending.dayNotes || []).slice();
  saveAscents();
  saveProjects();
  saveWishlist();
  saveDayNotes();
  importPending = null;
  importFileName = '';
  render();
  showToast('Log replaced from backup');
}

function cancelImport(){
  importPending = null;
  importFileName = '';
  render();
}

function renderProjects(){
  if(openProjectId){
    const p = projects.find(pr => pr.id === openProjectId);
    if(p) return renderProjectDetail(p);
    openProjectId = null;
  }
  return renderProjectList();
}

function projAttemptsTotal(p){
  let any = false;
  const sum = (p.sessions || []).reduce((s,sess) => {
    if(typeof sess.attempts === 'number' && !isNaN(sess.attempts)){ any = true; return s + sess.attempts; }
    return s;
  }, 0);
  return any ? sum : null;
}

function projLastDate(p){
  if(!p.sessions || p.sessions.length === 0) return p.createdDate;
  return p.sessions.reduce((latest, s) => s.date > latest ? s.date : latest, p.sessions[0].date);
}

function projGradeBadge(p){
  if(p.venue === 'gym'){
    const c = gymColorInfo(p.gymColor) || GYM_COLORS[0];
    return `<div class="grade-badge" style="background:${c.hex};">${c.label}</div>`;
  }
  return `<div class="grade-badge boulder-outdoor">${escapeHtml(p.grade || '?')}</div>`;
}

function renderProjectList(){
  const filtered = projects.filter(p => p.status === projectsFilter || projectsFilter === 'all')
    .slice().sort((a,b) => projLastDate(b).localeCompare(projLastDate(a)));

  const cards = filtered.length === 0
    ? `<div class="empty"><div class="big">No ${projectsFilter === 'all' ? '' : projectsFilter + ' '}projects</div>Start one for the climb you keep coming back to.</div>`
    : filtered.map(p => {
        const place = p.venue === 'gym' ? (p.gymName || 'Gym') : `${p.crag}${p.problemName ? ' · ' + p.problemName : ''}`;
        const sessions = (p.sessions || []).length;
        const attempts = projAttemptsTotal(p);
        return `
          <div class="proj-card" data-open-project="${p.id}">
            <div class="proj-card-top">
              <div class="proj-name">${escapeHtml(p.name)}</div>
              ${projGradeBadge(p)}
            </div>

  const daysSpan = Math.max(1, Math.round((new Date(projLastDate(p)) - new Date(firstDate)) / 86400000) + 1);

  const timeline = sessions.length === 0 ? `<div class="pyr-empty">No sessions logged yet — add your first one above.</div>` :

    <button type="button" class="back-link" id="back-to-projects">${iconBack()}Back to projects</button>
    <div class="proj-detail-header">
      <div>
        <div class="proj-name" style="font-size:19px;">${escapeHtml(p.name)}</div>
        <div class="proj-meta" style="margin-top:7px;">
          <span>${escapeHtml(place)}</span>
          <span class="tag">${escapeHtml(p.climbType || '—')}</span>
          <span class="status-badge ${p.status}">${p.status}</span>
        </div>
      </div>
      ${projGradeBadge(p)}
    </div>

    <div class="detail-stat-grid">
      <div class="stat-box"><div class="num">${sessions.length}</div><div class="label">Sessions</div></div>
      <div class="stat-box"><div class="num rust">${attemptsTotal !== null ? attemptsTotal : '—'}</div><div class="label">Total attempts</div></div>
      <div class="stat-box"><div class="num amber">${daysSpan}</div><div class="label">Days on project</div></div>
      <div class="stat-box"><div class="num">${fmtDate(firstDate).split(',')[0]}</div><div class="label">First tried</div></div>
    </div>

    <form id="session-form" class="session-form">
      <h4>Log a session</h4>
      <div class="row2">
        <div class="field"><label>Date</label><input type="date" id="sf-date" value="${todayISO()}"></div>
        <div class="field"><label>Attempts (optional)</label><input type="text" id="sf-attempts" inputmode="numeric" placeholder="e.g. 8"></div>
      </div>
      <div class="field">
        <label>Notes</label>
        <textarea id="sf-note" placeholder="Beta, highpoint, what's blocking you, how it felt…"></textarea>
      </div>
      ${p.venue === 'outdoor' ? `
        <div class="field">
          <label>Conditions (optional)</label>
          <div class="row2">
            <select id="sf-friction"><option value="">Friction</option>${FRICTION_OPTIONS.map(f => `<option value="${f}">${f}</option>`).join('')}</select>
            <select id="sf-humidity"><option value="">Humidity</option>${HUMIDITY_OPTIONS.map(h => `<option value="${h}">${h}</option>`).join('')}</select>
          </div>
          <input type="text" id="sf-temp" placeholder="Temp, e.g. 14°C" style="margin-top:8px;">
        </div>
      ` : ''}
      <div class="checkbox-row">
        <input type="checkbox" id="sf-sent">
        <label for="sf-sent">Sent it today 🎉</label>
      </div>
      <button type="submit" class="submit-btn">Add session</button>
    </form>

    <div class="timeline">
      <h3>Session history</h3>
      ${timeline}
    </div>

    <div class="proj-actions">
      <button type="button" class="backup-btn" id="edit-proj-toggle">Edit details</button>
      ${p.status === 'active' ? `<button type="button" class="backup-btn" data-set-status="parked">Park</button>` : `<button type="button" class="backup-btn" data-set-status="active">Reopen</button>`}

function createProject(){
  const name = document.getElementById('pf-name').value.trim();
  if(!name){ showToast('Give the project a name first'); return; }
  const base = {
    id: uid(),
    name,
    venue: projVenueChoice,
    climbType: document.getElementById('pf-climbtype').value,
    status: 'active',
    createdDate: todayISO(),
    sessions: []
  };
  if(projVenueChoice === 'gym'){
    base.gymName = document.getElementById('pf-gymname').value.trim();
    base.gymColor = document.getElementById('pf-gymcolor').value;
  }else{
    base.crag = document.getElementById('pf-crag').value;
    base.problemName = document.getElementById('pf-problem').value.trim();
    base.grade = document.getElementById('pf-vgrade').value;
  }
  projects.push(base);
  saveProjects();
  showNewProjectForm = false;
  projectPrefill = null;
  openProjectId = base.id;
  render();
  showToast('Project started');
}

function addSession(p){
  const date = document.getElementById('sf-date').value || todayISO();
  const attemptsRaw = document.getElementById('sf-attempts').value.trim();
  const attemptsNum = attemptsRaw === '' ? undefined : parseInt(attemptsRaw, 10);
  const note = document.getElementById('sf-note').value.trim();
  const sentToday = document.getElementById('sf-sent').checked;

  const session = { id: uid(), date, note, sent: sentToday };
  if(typeof attemptsNum === 'number' && !isNaN(attemptsNum)) session.attempts = attemptsNum;
  const frictionEl = document.getElementById('sf-friction');
  const humidityEl = document.getElementById('sf-humidity');
  const tempEl = document.getElementById('sf-temp');
  if(frictionEl && frictionEl.value) session.friction = frictionEl.value;
  if(humidityEl && humidityEl.value) session.humidity = humidityEl.value;
  if(tempEl && tempEl.value.trim()) session.temp = tempEl.value.trim();

  p.sessions = p.sessions || [];
  p.sessions.push(session);

  let justSent = false;
  if(sentToday && p.status !== 'sent'){
    p.status = 'sent';
    p.sentDate = date;
    justSent = true;
    const ascent = {
      id: uid(),
      venue: p.venue,
      climbType: p.climbType,
      status: 'sent',
      date,
      notes: `Sent project: ${p.name}`
    };
    if(p.venue === 'gym'){
      ascent.gymName = p.gymName;
      ascent.gymColor = p.gymColor;
    }else{
      ascent.crag = p.crag;
      ascent.problemName = p.problemName;
      ascent.grade = p.grade;
    }
    ascents.push(ascent);
    saveAscents();
  }

  saveProjects();
  render();
  showToast(justSent ? 'Sent! Logged to your ascent history too 🎉' : 'Session added');
}

function attachHandlers(){
  document.querySelectorAll('[data-nav]').forEach(btn => btn.addEventListener('click', () => { activeView = btn.dataset.nav; render(); }));
  document.querySelectorAll('[data-venue]').forEach(btn => btn.addEventListener('click', () => { venueChoice = btn.dataset.venue; render(); }));
  document.querySelectorAll('[data-filter]').forEach(el => el.addEventListener('click', () => { historyFilter = el.dataset.filter; render(); }));
  document.querySelectorAll('[data-pyr]').forEach(btn => btn.addEventListener('click', () => { pyramidMode = btn.dataset.pyr; render(); }));
  document.querySelectorAll('[data-breakdown]').forEach(btn => btn.addEventListener('click', () => { breakdownMode = btn.dataset.breakdown; render(); }));
  document.querySelectorAll('[data-progress-crag]').forEach(btn => btn.addEventListener('click', () => { progressCrag = btn.dataset.progressCrag; render(); }));

  /* Day notes */
  const dnDate = document.getElementById('dn-date');
  if(dnDate) dnDate.addEventListener('change', () => { dayNoteDate = dnDate.value || todayISO(); render(); });
  const saveDayNoteBtn = document.getElementById('save-day-note');
  if(saveDayNoteBtn){
    saveDayNoteBtn.addEventListener('click', () => {
      const date = document.getElementById('dn-date').value || todayISO();
      const text = document.getElementById('dn-text').value.trim();
      const existing = dayNotes.find(d => d.date === date);
      if(!text){
        if(existing){ dayNotes = dayNotes.filter(d => d.date !== date); saveDayNotes(); render(); showToast('Note cleared'); }
        return;
      }
      if(existing){ existing.note = text; } else { dayNotes.push({ id: uid(), date, note: text }); }
      saveDayNotes();
      dayNoteDate = date;
      render();
      showToast('Day note saved');
    });
  }
  const clearDayNoteBtn = document.getElementById('clear-day-note');
  if(clearDayNoteBtn){
    clearDayNoteBtn.addEventListener('click', () => {
      const date = document.getElementById('dn-date').value || todayISO();
      dayNotes = dayNotes.filter(d => d.date !== date);
      saveDayNotes();
      render();
      showToast('Note cleared');
    });
  }

  /* Wishlist */
  document.querySelectorAll('[data-wish-toggle]').forEach(btn => btn.addEventListener('click', () => {
    toggleWishlist(btn.dataset.wishCrag, btn.dataset.wishName, btn.dataset.wishGrade);
    render();
  }));
  document.querySelectorAll('[data-wish-remove]').forEach(btn => btn.addEventListener('click', () => {
    wishlist = wishlist.filter(w => w.id !== btn.dataset.wishRemove);
    saveWishlist();
    render();
  }));
  const wishAddBtn = document.getElementById('wish-add-btn');
  if(wishAddBtn){
    wishAddBtn.addEventListener('click', () => {
      const nameInput = document.getElementById('wish-add-name');
      const gradeSelect = document.getElementById('wish-add-grade');
      const name = nameInput.value.trim();
      if(!name){ showToast('Enter a problem name first'); return; }
      if(isWishlisted(progressCrag, name)){ showToast('Already on your wishlist'); return; }
      wishlist.push({ id: uid(), crag: progressCrag, name, grade: gradeSelect.value || '' });
      saveWishlist();
      render();
      showToast('Added to wishlist');
    });
  }

  /* History: search & sort */
  const historySearchInput = document.getElementById('history-search');
  if(historySearchInput){
    historySearchInput.addEventListener('input', () => {
      const cursorPos = historySearchInput.selectionStart;
      historySearch = historySearchInput.value;
      render();
      const fresh = document.getElementById('history-search');
      if(fresh){ fresh.focus(); fresh.setSelectionRange(cursorPos, cursorPos); }
    });
  }
  const historySortSelect = document.getElementById('history-sort');
  if(historySortSelect) historySortSelect.addEventListener('change', () => { historySort = historySortSelect.value; render(); });

  /* Ascent edit */
  document.querySelectorAll('[data-edit-ascent]').forEach(btn => btn.addEventListener('click', () => {
    const a = ascents.find(x => x.id === btn.dataset.editAscent);
    if(!a) return;
    editingAscentId = a.id;
    venueChoice = a.venue;
    if(a.venue === 'outdoor') cragChoice = a.crag || 'Calabogie';
    activeView = 'log';
    render();
  }));
  const cancelEditAscent = document.getElementById('cancel-edit-ascent');
  if(cancelEditAscent) cancelEditAscent.addEventListener('click', () => { editingAscentId = null; activeView = 'history'; render(); });

  /* Quick-start project from Crag Progress */
  document.querySelectorAll('[data-qs-name]').forEach(btn => btn.addEventListener('click', () => {
    projectPrefill = { name: btn.dataset.qsName, grade: btn.dataset.qsGrade, crag: btn.dataset.qsCrag };
    projVenueChoice = 'outdoor';
    projCragChoice = btn.dataset.qsCrag;
    showNewProjectForm = true;
    openProjectId = null;
    editingProjectFormOpen = false;
    activeView = 'projects';
    render();
    showToast(`Starting a project for ${btn.dataset.qsName}`);
  }));

  /* Projects: list & filters */
  document.querySelectorAll('[data-pfilter]').forEach(el => el.addEventListener('click', () => { projectsFilter = el.dataset.pfilter; render(); }));
  document.querySelectorAll('[data-open-project]').forEach(card => card.addEventListener('click', () => {
    openProjectId = card.dataset.openProject;
    editingProjectFormOpen = false;
    render();
  }));
  const backToProjects = document.getElementById('back-to-projects');
  if(backToProjects) backToProjects.addEventListener('click', () => {
    openProjectId = null;
    deleteProjectConfirmId = null;
    editingProjectFormOpen = false;
    render();
  });

  const newProjToggle = document.getElementById('new-proj-toggle');
  if(newProjToggle) newProjToggle.addEventListener('click', () => { showNewProjectForm = true; render(); });
  const cancelNewProj = document.getElementById('cancel-new-proj');
  if(cancelNewProj) cancelNewProj.addEventListener('click', () => { showNewProjectForm = false; projectPrefill = null; render(); });

  document.querySelectorAll('[data-pvenue]').forEach(btn => btn.addEventListener('click', () => { projVenueChoice = btn.dataset.pvenue; render(); }));
  const pCragSelect = document.getElementById('pf-crag');
  if(pCragSelect) pCragSelect.addEventListener('change', () => { projCragChoice = pCragSelect.value; render(); });
  const pProblemInput = document.getElementById('pf-problem');
  if(pProblemInput && projCragChoice === 'Calabogie'){
    pProblemInput.addEventListener('input', () => {
      const match = CALABOGIE_MAP[pProblemInput.value];
      const hint = document.getElementById('proj-problem-hint');
      const vSelect = document.getElementById('pf-vgrade');
      if(match){
        if(hint) hint.textContent = `Guidebook grade: ${match}`;
        if(VGRADES.includes(match) && vSelect) vSelect.value = match;
      }else if(hint){
        hint.textContent = '';
      }
    });
  }
  const newProjForm = document.getElementById('new-project-form');
  if(newProjForm) newProjForm.addEventListener('submit', (e) => { e.preventDefault(); createProject(); });

  /* Project edit details */
  const editProjToggle = document.getElementById('edit-proj-toggle');
  if(editProjToggle) editProjToggle.addEventListener('click', () => {
    const p = projects.find(pr => pr.id === openProjectId);
    if(!p) return;
    editingProjectFormOpen = true;
    projVenueChoice = p.venue;
    projCragChoice = p.crag || 'Calabogie';
    render();
  });
  const cancelEditProj = document.getElementById('cancel-edit-proj');
  if(cancelEditProj) cancelEditProj.addEventListener('click', () => { editingProjectFormOpen = false; render(); });
  const editProjForm = document.getElementById('edit-project-form');
  if(editProjForm){
    editProjForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const p = projects.find(pr => pr.id === openProjectId);
      if(!p) return;
      p.name = document.getElementById('pf-name').value.trim() || p.name;
      p.venue = projVenueChoice;
      p.climbType = document.getElementById('pf-climbtype').value;
      if(projVenueChoice === 'gym'){
        p.gymName = document.getElementById('pf-gymname').value.trim();
        p.gymColor = document.getElementById('pf-gymcolor').value;
        delete p.crag; delete p.problemName; delete p.grade;
      }else{
        p.crag = document.getElementById('pf-crag').value;
        p.problemName = document.getElementById('pf-problem').value.trim();
        p.grade = document.getElementById('pf-vgrade').value;
        delete p.gymName; delete p.gymColor;
      }
      saveProjects();
      editingProjectFormOpen = false;
      render();
      showToast('Project updated');
    });
  }

  /* Project detail: sessions & status */
  const sessionForm = document.getElementById('session-form');
  if(sessionForm && openProjectId){
    sessionForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const p = projects.find(pr => pr.id === openProjectId);
      if(p) addSession(p);
    });
  }
  document.querySelectorAll('[data-del-session]').forEach(btn => btn.addEventListener('click', () => {
    const p = projects.find(pr => pr.id === openProjectId);
    if(!p) return;
    p.sessions = (p.sessions || []).filter(s => s.id !== btn.dataset.delSession);
    saveProjects();
    render();
  }));
  document.querySelectorAll('[data-set-status]').forEach(btn => btn.addEventListener('click', () => {
    const p = projects.find(pr => pr.id === openProjectId);
    if(!p) return;
    p.status = btn.dataset.setStatus;
    saveProjects();
    render();
    showToast(p.status === 'active' ? 'Project reopened' : 'Project parked');
  }));
  const deleteProjBtn = document.getElementById('delete-proj-btn');
  if(deleteProjBtn) deleteProjBtn.addEventListener('click', () => { deleteProjectConfirmId = openProjectId; render(); });
  const confirmDeleteProj = document.getElementById('confirm-delete-proj');
  if(confirmDeleteProj) confirmDeleteProj.addEventListener('click', () => {
    projects = projects.filter(pr => pr.id !== openProjectId);
    saveProjects();
    openProjectId = null;
    deleteProjectConfirmId = null;
    render();
    showToast('Project deleted');
  });
  const cancelDeleteProj = document.getElementById('cancel-delete-proj');
  if(cancelDeleteProj) cancelDeleteProj.addEventListener('click', () => { deleteProjectConfirmId = null; render(); });
  document.querySelectorAll('[data-del]').forEach(btn => btn.addEventListener('click', () => {
    ascents = ascents.filter(a => a.id !== btn.dataset.del);
    saveAscents();
    render();
  }));

  const cragSelect = document.getElementById('f-crag');
  if(cragSelect){
    cragSelect.addEventListener('change', () => { cragChoice = cragSelect.value; render(); });
  }

  const exportBtn = document.getElementById('export-btn');
  if(exportBtn) exportBtn.addEventListener('click', exportBackup);

  const importBtn = document.getElementById('import-btn');
  const importFile = document.getElementById('import-file');
  if(importBtn && importFile){
    importBtn.addEventListener('click', () => importFile.click());
    importFile.addEventListener('change', () => {
      if(importFile.files && importFile.files[0]){
        readImportFile(importFile.files[0]);
      }
    });
  }

  const mergeBtn = document.getElementById('merge-btn');
  if(mergeBtn) mergeBtn.addEventListener('click', mergeImport);
  const replaceBtn = document.getElementById('replace-btn');
  if(replaceBtn) replaceBtn.addEventListener('click', replaceImport);
  const cancelImportBtn = document.getElementById('cancel-import-btn');
  if(cancelImportBtn) cancelImportBtn.addEventListener('click', cancelImport);

  const problemInput = document.getElementById('f-problem');
  if(problemInput && cragChoice === 'Calabogie'){
    problemInput.addEventListener('input', () => {
      const match = CALABOGIE_MAP[problemInput.value];
      const hint = document.getElementById('problem-hint');
      const vSelect = document.getElementById('f-vgrade');
      if(match){
        if(hint) hint.textContent = `Guidebook grade: ${match}`;
        if(VGRADES.includes(match) && vSelect) vSelect.value = match;
      }else if(hint){
        hint.textContent = '';
      }
    });
  }

  const form = document.getElementById('ascent-form');
  if(form){
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const fields = {
        venue: venueChoice,
        climbType: document.getElementById('f-climbtype').value,
        status: document.getElementById('f-status').value,
        date: document.getElementById('f-date').value || todayISO(),
        notes: document.getElementById('f-notes').value.trim()
      };
      if(venueChoice === 'gym'){
        fields.gymName = document.getElementById('f-gymname').value.trim();
        fields.gymColor = document.getElementById('f-gymcolor').value;
      }else{
        fields.crag = document.getElementById('f-crag').value;
        fields.problemName = document.getElementById('f-problem').value.trim();
        fields.grade = document.getElementById('f-vgrade').value;
        const frictionEl = document.getElementById('f-friction');
        const humidityEl = document.getElementById('f-humidity');
        const tempEl = document.getElementById('f-temp');
        if(frictionEl && frictionEl.value) fields.friction = frictionEl.value;
        if(humidityEl && humidityEl.value) fields.humidity = humidityEl.value;
        if(tempEl && tempEl.value.trim()) fields.temp = tempEl.value.trim();
      }

      if(editingAscentId){
        const existing = ascents.find(a => a.id === editingAscentId);
        if(existing){
          delete existing.gymName; delete existing.gymColor; delete existing.crag;
          delete existing.problemName; delete existing.grade;
          delete existing.friction; delete existing.humidity; delete existing.temp;
          Object.assign(existing, fields);
        }
        editingAscentId = null;
        saveAscents();
        activeView = 'history';
        render();
        showToast('Ascent updated');
      }else{
        ascents.push({ id: uid(), ...fields });
        saveAscents();
        activeView = 'history';
        render();
        showToast(storageOk ? 'Ascent logged' : 'Logged for this session only — storage unavailable');
      }
    });
  }
}

loadAscents();
loadProjects();
loadWishlist();
loadDayNotes();
render();
</script>
</body>
</html>
